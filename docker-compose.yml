version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: payment_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: >
      bash -c "
        mongod --replSet rs0 --bind_ip_all --port 27017 &
        sleep 8 &&
        mongosh --eval 'rs.initiate()' &&
        tail -f /dev/null
      "
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: